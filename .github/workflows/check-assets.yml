name: Check minified assets

on:
  pull_request:
    branches: ["main"]

jobs:
  check-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26.1.0"

      - name: Install dependencies
        run: npm install

      - name: Run Gulp
        run: npx gulp

      - name: Check minified assets are up to date
        run: |
          if [ -n "$(git status --porcelain css/stylesheet.min.css javascript/javascript.min.js)" ]; then
            echo "::error::Minified assets are out of date. Run 'gulp' locally and commit css/stylesheet.min.css and javascript/javascript.min.js before merging."
            git diff css/stylesheet.min.css javascript/javascript.min.js
            exit 1
          fi
